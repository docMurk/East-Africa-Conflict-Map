<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Horn & the Nile — Overlapping Conflicts in East Africa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF8F3;
  --panel: #FFFFFF;
  --ink: #1A1A1A;
  --ink-2: #555;
  --ink-3: #8A8A85;
  --line: #E3DFD5;
  --line-2: #CEC8B8;
  --land: #EFEBDF;
  --land-2: #E7E2D3;
  --water: #E4ECF0;
  --neutral: #D8D4CA;
  --saf: #1F3A5F;
  --rsf: #B8413A;
  --fed: #2F5233;
  --tplf: #C08A3E;
  --fgs: #2A7373;
  --sml: #6B4A8E;
  --ash: #7A2A2A;
  --shabaab: #7A2A2A;
  --unrest: #9A3B2E;
  --eritrean: #6B2E5E;
  --puntland: #4E6B8C;
  --khatumo: #D17A3D;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  overflow: hidden;
  height: 100vh;
}
.app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }
header {
  display: grid; grid-template-columns: 1fr auto;
  align-items: end; padding: 20px 28px 16px; border-bottom: 1px solid var(--line); gap: 24px;
}
.title { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
.subtitle {
  font-size: 11px; color: var(--ink-3); margin-top: 4px;
  letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
}
.mode-toggle {
  display: inline-flex; border: 1px solid var(--line-2); border-radius: 2px;
  overflow: hidden; background: var(--panel);
}
.mode-toggle button {
  appearance: none; background: var(--panel); border: none;
  border-right: 1px solid var(--line); padding: 9px 18px;
  font-family: inherit; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-2); cursor: pointer;
  transition: background .15s, color .15s; font-weight: 500;
}
.mode-toggle button:last-child { border-right: none; }
.mode-toggle button:hover { background: var(--land); }
.mode-toggle button.active { background: var(--ink); color: #fff; font-weight: 600; }

main { display: grid; grid-template-columns: 1fr 360px; min-height: 0; }
.map-wrap { position: relative; background: var(--water); overflow: hidden; border-right: 1px solid var(--line); }
#mapSvg { width: 100%; height: 100%; display: block; }

.sea-bg { fill: var(--water); }
.land { fill: var(--land); stroke: none; }
.context-land { fill: var(--land-2); stroke: none; }
.border { fill: none; stroke: #5C564A; stroke-width: 0.95px; stroke-linejoin: round; }
.border-inner { fill: none; stroke: #7A7263; stroke-width: 0.6px; stroke-dasharray: 2 2; }
.coast { fill: none; stroke: #A9B9C2; stroke-width: 0.6px; }
.river { fill: none; stroke: #A6BDCB; stroke-width: 1.1px; opacity: 0.85; stroke-linecap: round; }
.river.river-sm { stroke-width: 0.8px; opacity: 0.75; }
.graticule { fill: none; stroke: #D8D4C8; stroke-width: 0.3px; opacity: 0.5; }

/* Sea fill that sits inside the zoom group so pan reveals water, not canvas */
.sea-bg-inner { fill: var(--water); }

/* Zoom counter-scaling via SVG's native non-scaling-stroke. This keeps line
   weights visually constant regardless of zoom scale without us having to
   divide by --k on every rule. Font sizes and marker sizes still use --k. */
#mapRoot { --k: 1; }
#mapRoot .border,
#mapRoot .river,
#mapRoot .graticule,
#mapRoot .tint,
#mapRoot .city-ring,
#mapRoot .arrow-origin,
#mapRoot .arrow,
#mapRoot .arrow-halo,
#mapRoot .port-marker,
#mapRoot .base-marker,
#mapRoot .feature-dot,
#mapRoot .gateway-bg,
#mapRoot .gateway-dot-outer,
#mapRoot .gateway-dot-inner {
  vector-effect: non-scaling-stroke;
}

#mapRoot .country-label   { font-size: calc(10.5px / var(--k)); stroke-width: calc(2.5px / var(--k)); }
#mapRoot .country-label.small { font-size: calc(9px / var(--k)); stroke-width: calc(2px / var(--k)); }
#mapRoot .city-label      { font-size: calc(10px / var(--k)); stroke-width: calc(2.5px / var(--k)); }
#mapRoot .city-label.secondary { font-size: calc(8.5px / var(--k)); stroke-width: calc(2px / var(--k)); fill: #55544E; font-style: italic; }
#mapRoot .geo-label       { font-size: calc(10.5px / var(--k)); stroke-width: calc(2.5px / var(--k)); }
#mapRoot .geo-label.large { font-size: calc(14px / var(--k)); }
#mapRoot .feature-label   { font-size: calc(9.5px / var(--k)); stroke-width: calc(2px / var(--k)); }
#mapRoot .terrain-label {
  font-family: 'Instrument Serif', 'Playfair Display', Georgia, serif;
  font-size: calc(11px / var(--k));
  font-style: italic;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  fill: #7D6B3A;
  pointer-events: none;
  paint-order: stroke fill;
  stroke: var(--land);
  stroke-width: calc(2.5px / var(--k));
}
#mapRoot .terrain-label.large { font-size: calc(14px / var(--k)); letter-spacing: 0.32em; fill: #8C7840; }
#mapRoot .river-label { fill: #7A99AA; font-style: italic; }
#mapRoot .river-label.sm { font-size: calc(8.5px / var(--k)); }
#mapRoot .port-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(8px / var(--k));
  fill: #3A4B55;
  pointer-events: none;
  paint-order: stroke fill;
  stroke: var(--land);
  stroke-width: calc(1.8px / var(--k));
}
#mapRoot .port-marker { fill: #3A4B55; stroke: #FAF8F3; stroke-width: 0.8px; }
#mapRoot .base-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(9.5px / var(--k));
  fill: #2C2A26;
  font-weight: 600;
  pointer-events: none;
  paint-order: stroke fill;
  stroke: var(--land);
  stroke-width: calc(2.2px / var(--k));
}
#mapRoot .base-marker { stroke: #1A1A1A; stroke-width: 0.6px; }
/* Clustered base labels: the anchor group is positioned by JS each zoom
   tick so labels sit at a constant screen offset from their markers. */
.base-leader { stroke: #6B6460; stroke-width: 0.8px; opacity: 0.7; fill: none; vector-effect: non-scaling-stroke; }
/* The anchor group already applies scale(1/k), so reset --k inside it so
   the cascaded `calc(8px / var(--k))` rules render at their literal size. */
.base-label-anchor { --k: 1; }
/* Marker anchors are also counter-scaled each zoom tick so the triangle
   stays ~constant pixel size — prevents overlap when zoomed in. */
.base-marker-anchor { --k: 1; }
.base-marker-anchor .base-marker { stroke-width: 0.8px; }

/* The zoom surface gets a grabby cursor so users know it's pannable. */
#mapSvg { cursor: grab; }
#mapSvg:active { cursor: grabbing; }

.country-label {
  font-size: 10.5px; fill: #5C5A52; font-weight: 500;
  letter-spacing: 0.04em; pointer-events: none; text-anchor: middle;
  text-transform: uppercase; paint-order: stroke fill;
  stroke: var(--land); stroke-width: 2.5px;
}
.country-label.small { font-size: 9px; fill: #7B7A72; stroke-width: 2px; }
.country-label.sea { stroke: var(--water); }

.city-dot { fill: #1A1A1A; }
.city-dot.capital { fill: #1A1A1A; }
.city-ring { fill: none; stroke: #1A1A1A; stroke-width: 1; }
.city-label {
  font-size: 10px; fill: var(--ink); font-family: 'JetBrains Mono', monospace;
  pointer-events: none; paint-order: stroke fill;
  stroke: var(--land); stroke-width: 2.5px; stroke-linejoin: round;
}
.city-label.capital { font-weight: 600; }
.city-label.sea { stroke: var(--water); }

.geo-label {
  font-style: italic; fill: #7A99AA; font-size: 10.5px;
  pointer-events: none; letter-spacing: 0.04em;
  paint-order: stroke fill; stroke: var(--water); stroke-width: 2.5px;
}
.geo-label.large { font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase; fill: #9EB4C0; }
.feature-label { fill: #6B6A62; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; pointer-events: none; paint-order: stroke fill; stroke: var(--land); stroke-width: 2px; }
.feature-dot { fill: none; stroke: #555; stroke-width: 0.8; }

.tint { stroke: var(--line-2); stroke-width: 0.5; cursor: pointer; transition: opacity .15s; }
.tint:hover { opacity: 0.82 !important; }

.arrow { fill: none; cursor: pointer; transition: opacity .15s; }
.arrow-halo { fill: none; stroke: transparent; }
.arrow-origin { stroke: #FAF8F3; stroke-width: 1.2; }
#mapRoot .gateway-label { font-size: calc(10px / var(--k)); }
#mapRoot .gateway-bg { stroke-width: calc(0.8px / var(--k)); }
#mapRoot .gateway-dot-outer { r: calc(4px / var(--k)); stroke-width: calc(1.4px / var(--k)); }
#mapRoot .gateway-dot-inner { r: calc(1.4px / var(--k)); }
#mapRoot .gateway-bg { transform-box: fill-box; transform-origin: center; transform: scale(calc(1 / var(--k))); }

/* Off-map "gateway" markers — labelled anchors for actors outside the focus area */
.gateway-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  fill: var(--ink);
  text-transform: uppercase;
  pointer-events: none;
}
.gateway-bg {
  fill: rgba(250, 248, 243, 0.92);
  stroke: var(--line);
  stroke-width: 0.8;
}
.gateway-dot-outer {
  fill: var(--ink);
  stroke: #FAF8F3;
  stroke-width: 1.4;
}
.gateway-dot-inner { fill: #FAF8F3; }
.gateway:hover .gateway-bg { fill: #F1EEE5; }

.rail { background: var(--panel); display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.rail-inner { overflow-y: auto; padding: 20px 22px; flex: 1; }
.rail-section-title {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-3); font-family: 'JetBrains Mono', monospace;
  margin: 0 0 14px 0; font-weight: 500;
}
.rail-desc { font-size: 12px; color: var(--ink-2); margin: -6px 0 18px 0; line-height: 1.55; }
.actor-card { border-top: 1px solid var(--line); padding: 14px 0; }
.actor-card:last-child { border-bottom: 1px solid var(--line); }
.actor-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.actor-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.actor-name { font-weight: 600; font-size: 13px; }
.actor-posture { font-size: 12px; color: var(--ink-2); line-height: 1.5; }
.actor-types { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.type-chip {
  font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em;
  color: var(--ink-3); text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 5px;
}
.type-chip svg { width: 24px; height: 8px; }

.detail-panel { padding: 20px 22px; flex: 1; overflow-y: auto; }
.back-btn {
  appearance: none; background: none; border: none; padding: 0;
  color: var(--ink-3); font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 18px;
}
.back-btn:hover { color: var(--ink); }
.detail-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px 0; }
.detail-kicker {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px;
}
.detail-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px;
  padding: 14px 0; border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line); margin-bottom: 16px;
}
.meta-item .k {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px;
}
.meta-item .v { font-size: 13px; font-weight: 500; }
.detail-summary { font-size: 13px; line-height: 1.6; color: var(--ink); margin-bottom: 18px; }
.cross-modes { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 6px; }
.cross-title {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 10px; white-space: nowrap;
}
.cross-row { padding: 10px 0; border-top: 1px dashed var(--line); }
.cross-row:first-of-type { border-top: none; padding-top: 0; }
.cross-label { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.cross-dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; opacity: 0.85; }
.cross-mode { font-size: 11px; font-weight: 600; color: var(--ink-2); }
.cross-side { font-size: 12.5px; font-weight: 500; margin-bottom: 4px; }
.cross-role { font-size: 12px; color: var(--ink-2); line-height: 1.5; }
.sources-title {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin: 0 0 10px 0;
}
.source-item { font-size: 12px; padding: 9px 0; border-top: 1px dashed var(--line); line-height: 1.5; }
.source-item:first-of-type { border-top: none; }
.sources-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
.sources-block .source-item a {
  font-weight: 600; color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line-2);
}
.sources-block .source-item a:hover { border-bottom-color: var(--ink); }
.sources-block .src-date {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-3); margin-left: 8px; letter-spacing: 0.04em;
}
.sources-block .src-head { color: var(--ink-2); margin-top: 2px; }
.status-chip {
  display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: #8A5A1A; background: #F5EBD7; padding: 3px 8px; border-radius: 2px;
  margin-bottom: 12px;
}
.source-pub { font-weight: 600; margin-right: 6px; }
.source-date {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-3); margin-left: 6px;
}
.source-item a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line-2); }
.source-item a:hover { border-bottom-color: var(--ink); }

footer {
  border-top: 1px solid var(--line); padding: 8px 20px;
  display: flex; flex-wrap: wrap; gap: 10px 22px;
  align-items: center; background: var(--panel); font-size: 11px;
  max-height: 46px; overflow: hidden;
}
.legend-group { display: inline-flex; gap: 14px; align-items: center; flex-wrap: nowrap; }
.legend-swatch { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--ink-2); white-space: nowrap; }
.legend-swatch .sw { width: 14px; height: 10px; border: 1px solid rgba(0,0,0,0.08); }
.legend-arrows { display: inline-flex; gap: 10px; align-items: center; flex-wrap: nowrap; margin-left: auto; }
.legend-arrow {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--ink-2);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
  white-space: nowrap;
}
.legend-arrow svg { width: 28px; height: 10px; }
/* Aid-type toggle chip — reuses .legend-arrow styling but clickable. */
.legend-toggle {
  appearance: none; background: transparent; border: 1px solid transparent;
  padding: 3px 7px; border-radius: 3px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--ink); font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em; white-space: nowrap; transition: background .12s, color .12s, opacity .12s;
}
.legend-toggle svg { width: 28px; height: 10px; color: #444; }
.legend-toggle:hover { background: var(--land); }
.legend-toggle.off { color: var(--ink-3); opacity: 0.45; text-decoration: line-through; }
.legend-toggle.off svg { color: #A09A8A; }
.legend-tiers {
  display: inline-flex; gap: 6px; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  color: var(--ink-3); letter-spacing: 0.04em; white-space: nowrap;
}
.footer-note {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.06em; color: var(--ink-3); text-transform: uppercase;
  white-space: nowrap;
}
.loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3);
  letter-spacing: 0.1em; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1 class="title">The Horn &amp; the Nile — Overlapping Conflicts in East Africa</h1>
      <div class="subtitle" id="subtitle">Current state, 2021–2026</div>
    </div>
    <div class="mode-toggle" id="modeToggle" role="tablist">
      <button data-mode="sudan" class="active">Sudan</button>
      <button data-mode="ethiopia">Ethiopia</button>
      <button data-mode="somalia">Somalia</button>
    </div>
  </header>
  <main>
    <div class="map-wrap">
      <div class="loading" id="loading">Loading map…</div>
      <svg id="mapSvg"></svg>
    </div>
    <aside class="rail" id="rail"></aside>
  </main>
  <footer id="legend"></footer>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
// Conflict data: alignments, arrows, country profiles, sources
// All sources are real public reporting from 2021-2026 where possible

window.CONFLICT_DATA = {
  modes: {
    sudan: {
      title: "Sudan Civil War",
      subtitle: "SAF vs. RSF · April 2023–present · admin-1 control as of Apr 2026",
      sides: [
        { id: "saf", label: "SAF / Sudanese federal govt", color: "#1F3A5F" },
        { id: "rsf", label: "Rapid Support Forces (RSF)", color: "#B8413A" },
        { id: "contested", label: "Contested / active frontline", color: "#8A857A" },
        { id: "neutral", label: "Neutral / unclear", color: "#D8D4CA" }
      ],
      // Country-level alignment for peripheral actors. Sudan itself and Libya
      // are NOT tagged here — they come from admin-1 CONTROL below.
      alignments: {
        EGY: "saf",
        ERI: "saf",
        TUR: "saf",
        IRN: "saf",
        SAU: "saf",
        QAT: "saf",
        UAE: "rsf",
        TCD: "contested", // officially neutral, transit concerns
        ETH: "neutral",
        SSD: "neutral",
        KEN: "neutral",
        DJI: "neutral",
        SOM: "neutral",
        SOL: "neutral",
        YEM: "neutral",
        OMN: "neutral"
      }
    },
    ethiopia: {
      title: "Ethiopian Internal Conflicts",
      subtitle: "TPLF aftermath, Fano/OLA insurgencies · admin-1 status as of Apr 2026",
      sides: [
        { id: "fed", label: "Federal government (Addis)", color: "#2F5233" },
        { id: "tplf", label: "TPLF / Tigray & aligned fronts", color: "#C08A3E" },
        { id: "unrest", label: "Active insurgency (Fano, OLA)", color: "#9A3B2E" },
        { id: "eritrean", label: "Reported Eritrean presence", color: "#6B2E5E" },
        { id: "contested", label: "Contested / mixed", color: "#8A857A" },
        { id: "neutral", label: "Neutral / unclear", color: "#D8D4CA" }
      ],
      // Sides mapping: 'fed' (federal-controlled), 'tplf' (Tigray held by TPLF),
      // 'unrest' (active insurgency), 'eritrean' (reported Eritrean presence),
      // 'contested' (mixed/overlap). External actors stay country-level.
      alignments: {
        ERI: "fed", // historically against TPLF; note: reported recent rapprochement w/ Debretsion faction
        EGY: "tplf", // political support vs Addis (GERD)
        SDN: "tplf", // complicated; al-Fashaga + historical
        SOM: "fed",
        SOL: "fed", // Jan 2024 MoU aligning with Addis
        DJI: "fed",
        KEN: "fed",
        TUR: "fed",
        UAE: "fed", // drones to Addis
        IRN: "fed", // drones reported
        SAU: "neutral",
        QAT: "neutral",
        YEM: "neutral",
        SSD: "neutral"
      }
    },
    somalia: {
      title: "Somalia – Somaliland & Al-Shabaab Insurgency",
      subtitle: "FGS, Somaliland, Puntland, Khatumo, Al-Shabaab · admin-1 as of Apr 2026",
      sides: [
        { id: "fgs", label: "Federal Government of Somalia", color: "#2A7373" },
        { id: "sml", label: "Somaliland", color: "#6B4A8E" },
        { id: "puntland", label: "Puntland", color: "#4E6B8C" },
        { id: "khatumo", label: "SSC-Khatumo", color: "#D17A3D" },
        { id: "shabaab", label: "Al-Shabaab control", color: "#7A2A2A" },
        { id: "contested", label: "Contested / mixed", color: "#8A857A" },
        { id: "neutral", label: "Neutral / unclear", color: "#D8D4CA" }
      ],
      // External actors at country level. Somalia's admin-1 regions come from CONTROL below.
      alignments: {
        TUR: "fgs",
        EGY: "fgs",
        ERI: "fgs",
        QAT: "fgs",
        UAE: "sml", // Berbera, DP World, Puntland ties
        ETH: "sml", // MoU Jan 2024
        SOL: "sml", // Somaliland itself, its own side
        KEN: "fgs",

// Arrow style by type
function arrowStyle(type) {
  switch (type) {
    case 'military':   return { dash: null, double: false, wavy: false };
    case 'diplomatic': return { dash: '8 5', double: false, wavy: false };
    case 'financial':  return { dash: '1.5 4', double: false, wavy: false };
    case 'trade':      return { dash: null, double: true, wavy: false };
    case 'illicit':    return { dash: null, double: false, wavy: true };
    default:           return { dash: null, double: false, wavy: false };
  }
}
function tierWidth(tier) { return { 1: 5.0, 2: 8.5, 3: 12.0 }[tier] || 6.0; }
// Zoom-dependent arrow width multiplier: 1.0x at the default view, growing
// gradually to ~2.5x at max zoom so arrows remain readable when the map is
// zoomed in and the empty land space around them expands.
function arrowWidthMul(k) { return Math.min(2.5, 1 + 0.2 * (k - 1)); }

// De-collide city / port / secondary labels in screen-pixel space. Called
// from updateZoomLayers on every zoom tick. Labels live in projected coords
// inside #mapRoot, which scales by k — so 1 screen-pixel of vertical push
// equals (1/k) projected-units added to the text's `y` attribute.
//
// Priority order (higher priority stays put; lower priority gets pushed):
//   1. Capital cities  2. Regular cities  3. Ports  4. Secondary cities
// Labels are also first reset to their original y each tick so pushes from
// one zoom level don't accumulate at the next.
function decollideCityLabels(k) {
  // Movable labels: each group is one priority tier. Only city and port
  // labels move — the base labels belong to the cluster-splay system above
  // and are treated as fixed obstacles instead.
  const groups = [
    svg.selectAll('.city-primary text.city-label.capital').nodes(),
    svg.selectAll('.city-primary text.city-label:not(.capital)').nodes(),
    svg.selectAll('.port-layer text.port-label').nodes(),
    svg.selectAll('.city-secondary text.city-label').nodes(),
  ];
  const all = groups.flat();
  // Seed base y — store original y (projected coords) on first encounter.
  all.forEach(el => {
    if (!el.hasAttribute('data-base-y')) el.setAttribute('data-base-y', el.getAttribute('y') || '0');
    el.setAttribute('y', el.getAttribute('data-base-y'));
    el.style.display = '';
  });

  // Fixed obstacles: base / cluster labels (Djibouti cluster, solo bases).
  // City and port labels must avoid these; the obstacle labels don't move.
  const obstacles = svg.selectAll('.base-layer text.base-label').nodes();
  const obstacleRects = () => obstacles.map(el => el.getBoundingClientRect());

  const overlap = (a, b) =>
    !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);

  // Iterative nudge: walk pairs plus each movable label vs every obstacle.
  // Overlap resolved by pushing the lower-priority element (or, for an
  // obstacle, always the movable label) vertically by the overlap amount
  // converted from screen-px to projected units via /k.
  for (let iter = 0; iter < 6; iter++) {
    const rects = all.map(el => ({ el, r: el.getBoundingClientRect() }));
    const obs = obstacleRects();
    let moved = false;
    // movable-vs-movable
    for (let i = 0; i < rects.length; i++) {
      for (let j = i + 1; j < rects.length; j++) {
        const a = rects[i].r, b = rects[j].r;
        if (!overlap(a, b)) continue;
        const ga = groups.findIndex(g => g.includes(rects[i].el));
        const gb = groups.findIndex(g => g.includes(rects[j].el));
        const loserIdx = gb > ga ? j : (ga > gb ? i : (a.top < b.top ? j : i));
        const target = rects[loserIdx].el;
        const other = loserIdx === i ? rects[j].r : rects[i].r;
        const ov = Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top) + 2;
        const dir = rects[loserIdx].r.top < other.top ? -1 : 1;
        target.setAttribute('y', (+target.getAttribute('y')) + dir * ov / k);
        moved = true;
      }
    }
    // movable-vs-obstacle
    for (let i = 0; i < rects.length; i++) {
      for (let o = 0; o < obs.length; o++) {
        const a = rects[i].r, b = obs[o];
        if (!overlap(a, b)) continue;
        const target = rects[i].el;
        const ov = Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top) + 2;
        const dir = a.top < b.top ? -1 : 1;
        target.setAttribute('y', (+target.getAttribute('y')) + dir * ov / k);
        moved = true;
      }
    }
    if (!moved) break;
  }

  // Last resort at high zoom: hide any secondary-city label still overlapping
  // anything after nudging. Its dot stays, just the name drops out.
  if (k >= 3) {
    const secondary = groups[3];
    const finalRects = all.map(el => ({ el, r: el.getBoundingClientRect() }));
    const obs = obstacleRects();
    secondary.forEach(el => {
      const rec = finalRects.find(r => r.el === el);
      if (!rec) return;
      const clash = finalRects.some(o => o.el !== el && overlap(rec.r, o.r)) ||
                    obs.some(ob => overlap(rec.r, ob));
      if (clash) el.style.display = 'none';
    });
  }
}

// ---------- Load map ----------
let projection, pathGen, svg, width = 1000, height = 700;

async function loadMap() {
  try {
    const [world, admin1] = await Promise.all([
      d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json'),
      d3.json('admin1.json')
    ]);
    state.world = world;
    state.admin1 = admin1;
    // Index admin-1 features by (country ISO, region name) for O(1) lookup in renderTints.
    state.admin1ByCountry = {};
    for (const f of admin1.features) {
      const iso = f.properties.adm0_a3;
      (state.admin1ByCountry[iso] = state.admin1ByCountry[iso] || {})[f.properties.name] = f;
    }
    const countries = topojson.feature(world, world.objects.countries).features;
    countries.forEach(f => {
      const code = NAME_TO_OUR[f.properties.name];
      if (code) state.countriesByIso[code] = f;
      state.countriesById[f.id] = f;
    });
    // Wait a tick so layout is settled before measuring (setTimeout, not rAF —
    // rAF is paused in hidden tabs / background iframes and would hang forever).
    await new Promise(r => setTimeout(r, 0));
    initSvg();
    render();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').textContent = 'Failed to load map: ' + e.message;
    console.error(e);
  }
}

function initSvg() {
  svg = d3.select('#mapSvg');
  const wrap = document.querySelector('.map-wrap');
  width = wrap.clientWidth; height = wrap.clientHeight;
  svg.attr('viewBox', `0 0 ${width} ${height}`)
     .attr('preserveAspectRatio', 'xMidYMid meet');

  // Projection: center on NE Africa. Use Mercator for familiar shapes in this lat range.
  // Focus area roughly lon 10..65, lat -5..45.
  projection = d3.geoMercator();
  pathGen = d3.geoPath(projection);

  // Tight focus area as corner points (MultiPoint — works correctly with fitSize on Mercator).
  // Lat bounds extended north (past Turkey's ~42°N) and south (past Kenya's
  // ~-5°S) with ~15% headroom so no focus country is clipped by the frame.
  const focus = {
    type: 'MultiPoint',
    coordinates: [[15, -10],[60, -10],[60, 47],[15, 47]]
  };
  projection.fitSize([width, height], focus);

  // defs
  const defs = svg.append('defs');
  // Patterns + arrowheads
  const allColors = new Set();
  Object.values(DATA.modes).forEach(m => m.sides.forEach(s => allColors.add(s.color)));
  allColors.forEach(c => {
    const cid = c.replace('#','');
    defs.append('marker')
      .attr('id', `arrowhead-${cid}`)
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 8).attr('refY', 5)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto-start-reverse')
      .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 Z').attr('fill', c);
    // Small variant for dense targets where many arrows converge
    defs.append('marker')
      .attr('id', `arrowhead-${cid}-sm`)
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 8).attr('refY', 5)
      .attr('markerWidth', 4).attr('markerHeight', 4)
      .attr('orient', 'auto-start-reverse')
      .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 Z').attr('fill', c);
  });

  ['saf','rsf','fed','tplf','fgs','sml','ash','shabaab','neutral','unrest','eritrean','puntland','khatumo'].forEach(id => {
    const color = getComputedStyle(document.documentElement).getPropertyValue('--' + id).trim();
    // Solid wash
    defs.append('pattern')
      .attr('id', `solid-${id}`)
      .attr('patternUnits', 'userSpaceOnUse').attr('width', 10).attr('height', 10)
      .html(`<rect width="10" height="10" fill="${color}" opacity="0.55"/>`);
    // Diagonal hatch for contested / ash
    defs.append('pattern')
      .attr('id', `hatch-${id}`)
      .attr('patternUnits', 'userSpaceOnUse').attr('width', 7).attr('height', 7).attr('patternTransform', 'rotate(45)')
      .html(`<rect width="7" height="7" fill="${color}" opacity="0.25"/><line x1="0" y1="0" x2="0" y2="7" stroke="${color}" stroke-width="1.3"/>`);
  });
  // Contested (neutral hatch)
  defs.append('pattern')
    .attr('id', 'contested-hatch')
    .attr('patternUnits', 'userSpaceOnUse').attr('width', 6).attr('height', 6).attr('patternTransform', 'rotate(45)')
    .html(`<rect width="6" height="6" fill="#B5B0A0" opacity="0.35"/><line x1="0" y1="0" x2="0" y2="6" stroke="#7C766A" stroke-width="0.9"/>`);

  // Clip to viewport
  defs.append('clipPath').attr('id', 'view-clip')
    .append('rect').attr('x', 0).attr('y', 0).attr('width', width).attr('height', height);

  // Sea background — fills the whole frame; a nonscaling overlay so the sea
  // color stays flat when the user zooms/pans inside the map.
  svg.append('rect').attr('class', 'sea-bg').attr('width', width).attr('height', height);

  // Everything that should pan/zoom lives inside #mapRoot. The zoom transform
  // is applied here by d3.zoom; layers inside keep their projected coords.
  const mapRoot = svg.append('g').attr('id', 'mapRoot').attr('clip-path', 'url(#view-clip)');
  // Secondary sea fill — sits below land inside the zoomed group so the area
  // outside the originally-rendered frame still reads as water when panned.
  mapRoot.append('rect')
    .attr('class', 'sea-bg-inner')
    .attr('x', -width * 2).attr('y', -height * 2)
    .attr('width', width * 5).attr('height', height * 5);
  // Graticule (faint) — moved inside so it pans with the map
  const grat = d3.geoGraticule().step([5, 5]);
  mapRoot.append('path').datum(grat()).attr('class', 'graticule').attr('d', pathGen);

  // Group layers (all panned/zoomed together).
  mapRoot.append('g').attr('id', 'landLayer');
  mapRoot.append('g').attr('id', 'tintLayer');
  mapRoot.append('g').attr('id', 'borderLayer');
  mapRoot.append('g').attr('id', 'riverLayer');
  mapRoot.append('g').attr('id', 'arrowLayer');
  mapRoot.append('g').attr('id', 'geoLayer');
  mapRoot.append('g').attr('id', 'cityLayer');
  mapRoot.append('g').attr('id', 'countryLabelLayer');
  // Gateway chips are inside the zoomed root so they anchor to their entry
  // points; text & markers are counter-scaled in updateZoomLayers.
  mapRoot.append('g').attr('id', 'gatewayLayer');

  // Render land & borders (mode-independent)
  renderLand();
  renderRivers();
  renderGeoLabels();
  renderCities();
  renderCountryLabels();

  // ---------- Zoom & pan ----------
  // Clamp the user's panning to roughly the region bounded by:
  //   west  : 13°E  (west of Chad's western border)
  //   east  : 64°E  (east of Iran's eastern border)
  //   north : 42°N  (north of Türkiye's north border)
  //   south : -5°S  (south of Kenya's southern border)
  // At zoom=1 the current fitSize focus is [15..60, -3..40]; we let users pan
  // a small amount outside that box, up to these hard walls.
  const clampBox = [projection([13, 42]), projection([64, -5])];
  const translateExtent = [
    [Math.min(clampBox[0][0], clampBox[1][0]), Math.min(clampBox[0][1], clampBox[1][1])],
    [Math.max(clampBox[0][0], clampBox[1][0]), Math.max(clampBox[0][1], clampBox[1][1])],
  ];
  const zoomBehavior = d3.zoom()
    .scaleExtent([1, 8])
    .translateExtent(translateExtent)
    .filter(event => {
      // Allow wheel zoom + left-button drag; disable middle/right-button drags.
      if (event.type === 'wheel') return true;
      if (event.type === 'mousedown') return event.button === 0;
      return !event.ctrlKey && !event.button;
    })
    .on('zoom', (event) => {
      svg.select('#mapRoot').attr('transform', event.transform);
      updateZoomLayers(event.transform.k);
    });
  svg.call(zoomBehavior);
  state.zoom = zoomBehavior;
  // Start at identity — kick off one update so counter-scaled strokes are right.
  updateZoomLayers(1);

  // If ?focus=lon,lat,zoom was passed, apply a matching zoom transform after
  // layout so screenshots / deep-links can target specific regions. We
  // compute the transform algebraically: d3.zoom's transform T applies
  //   x' = T.k * projX + T.x   (and similarly for y)
  // so to place the projected point (px, py) at the viewport center we need
  //   T.x = width/2 - T.k * px; T.y = height/2 - T.k * py.
  if (state.initialSelect) {
    if (DATA.countries[state.initialSelect]) {
      state.selected = { type: 'country', id: state.initialSelect };
    } else {
      // City name fallback — try primary, secondary, then ports.
      const found = CITIES.find(c => c.name === state.initialSelect) ||
                    SECONDARY_CITIES.find(c => c.name === state.initialSelect) ||
                    PORTS.find(p => p.name === state.initialSelect);
      if (found) state.selected = { type: 'city', id: state.initialSelect };
    }
    if (state.selected) renderRail();
  }
  if (state.initialFocus && state.initialFocus.length === 3) {
    const [lon, lat, k] = state.initialFocus;
    const p = projection([lon, lat]);
    if (p && isFinite(p[0])) {
      const t = d3.zoomIdentity
        .translate(width / 2 - k * p[0], height / 2 - k * p[1])
        .scale(k);
      svg.call(zoomBehavior.transform, t);
    }
  }
}

// Show/hide zoom-dependent layers AND counter-scale line widths + label sizes
// so the map doesn't get a heavier visual weight the more you zoom in.
function updateZoomLayers(k) {
  if (!svg) return;
  // Reveal thresholds (match the data annotations above).
  const showSecondaryCities = k >= 2.5;
  const showPortsAndBases   = k >= 3.0;
  const showGeoZ2           = k >= 2.0;

  svg.select('.city-secondary').style('display', showSecondaryCities ? null : 'none');
  svg.select('.port-layer').style('display', showPortsAndBases ? null : 'none');
  svg.select('.base-layer').style('display', showPortsAndBases ? null : 'none');
  // Absorbed primary cities (e.g. Djibouti) render at true position for low
  // zoom; the cluster splay takes over at zoom ≥ 3, so hide the primaries
  // once the cluster is visible to avoid drawing each city twice.
  svg.selectAll('.absorbed-primary').style('display', showPortsAndBases ? 'none' : null);
  svg.select('.geo-z2').style('display', showGeoZ2 ? null : 'none');
  svg.select('.river-secondary').style('display', showGeoZ2 ? null : 'none');

  // Arrow widths scale with zoom: constant at default (k=1), growing toward
  // ~1.85x at max zoom so strokes remain readable when the map is zoomed in.
  // Origin dots scale similarly to match their arrows' weight.
  const mul = arrowWidthMul(k);
  svg.selectAll('.arrow[data-base-w]').each(function() {
    const base = +this.getAttribute('data-base-w');
    if (isFinite(base)) this.setAttribute('stroke-width', base * mul);
  });
  // Counter-scale the origin dot radius by k so it stays a constant visual
  // pixel size regardless of zoom. Without this, the dots grow proportional
  // to k and swallow a quarter of the map at max zoom.
  svg.selectAll('.arrow-origin[data-base-r]').each(function() {
    const base = +this.getAttribute('data-base-r');
    if (isFinite(base)) {
      this.setAttribute('r', (base * mul) / k);
      this.setAttribute('stroke-width', 0.9 / k);
    }
  });

  // City + port label de-collision. Labels are positioned in projected coords
  // and sit inside #mapRoot (which scales by k). Text itself is counter-scaled
  // via CSS so it stays 10px regardless of zoom, but adjacent cities can still
  // stack on top of each other — especially in the Djibouti cluster at max
  // zoom. Approach: reset each label to its base position, then iteratively
  // push overlapping pairs apart along the vertical axis in screen-px.
  decollideCityLabels(k);

  // Counter-scale: keep line weights and text visually constant as k grows.
  // We use vector-effect: non-scaling-stroke via a CSS var on mapRoot, and
  // shrink font-size through a computed style variable.
  const mapRoot = svg.select('#mapRoot');
  mapRoot.style('--k', k);

  // Splay labels for clustered bases: place each label anchor at a constant
  // screen-pixel offset from the marker (ringR pixels ÷ k, so it stays
  // the same visual size), and draw the leader line back to the marker.
  // Counter-scale marker anchors — keeps triangle markers at a constant
  // on-screen size and pushes each one to its screen-px offset on the
  // inner cluster ring.
  svg.selectAll('.base-marker-anchor').each(function() {
    const el = d3.select(this);
    const lx = +el.attr('data-lx') || 0;
    const ly = +el.attr('data-ly') || 0;
    el.attr('transform', `translate(${lx/k} ${ly/k}) scale(${1/k})`);
  });

  // Label anchors — position + counter-scale. Leader line runs from the
  // label origin (0,0 in anchor-local coords, which is screen-px after the
  // 1/k scale) back toward the marker position. For cluster labels, the
  // marker sits on the inner ring at (markerR * cos, markerR * sin) in
  // screen-px; the label origin sits on the outer ring at (labelR * cos,
  // labelR * sin); so the leader endpoint in anchor-local coords is
  // ((markerR - labelR) * cos, (markerR - labelR) * sin).
  svg.selectAll('.base-label-anchor').each(function() {
    const el = d3.select(this);
    const lx = +el.attr('data-lx');
    const ly = +el.attr('data-ly');
    el.attr('transform', `translate(${lx/k} ${ly/k}) scale(${1/k})`);
    const leader = el.select('line[data-leader]');
    if (leader.size()) {
      const markerR = +leader.attr('data-marker-r');
      const labelR  = +leader.attr('data-label-r');
      const ang     = +leader.attr('data-angle');
      if (isFinite(markerR) && isFinite(labelR) && isFinite(ang)) {
        // Cluster label: stop leader short of the marker (4px gap).
        const endR = markerR - labelR + 5; // negative, pulled in 5px
        leader.attr('x2', endR * Math.cos(ang))
              .attr('y2', endR * Math.sin(ang));
      } else {
        // Solo label: leader goes straight back to origin of marker group.
        leader.attr('x2', -lx).attr('y2', -ly);
      }
    }
  });

  // --- Collision resolution for base labels ---
  // Two rounds of pushing overlapping labels apart along the screen Y axis so
  // Djibouti-cluster labels don't collide with Berbera, Assab, etc. at
  // different zooms. We read on-screen bounding boxes, detect pairwise
  // overlaps, and nudge the farther (lower) of each pair downward/upward in
  // the anchor's local coords — enough to separate them vertically. The
  // anchor uses translate(lx/k, ly/k) scale(1/k), so 1px on-screen equals
  // 1 unit when added to the transform's translate output... but it's
  // easier to just bump the data-ly and re-apply.
  const labelEls = svg.selectAll('.base-label-anchor').nodes();
  const rects = labelEls.map(el => {
    const t = el.querySelector('text');
    if (!t) return null;
    const bb = t.getBoundingClientRect();
    return { el, x1: bb.x, y1: bb.y, x2: bb.x + bb.width, y2: bb.y + bb.height };
  });
  for (let iter = 0; iter < 6; iter++) {
    let moved = false;
    for (let i = 0; i < rects.length; i++) {
      for (let j = i + 1; j < rects.length; j++) {
        const a = rects[i], b = rects[j];
        if (!a || !b) continue;
        if (a.x1 < b.x2 && a.x2 > b.x1 && a.y1 < b.y2 && a.y2 > b.y1) {
          // Overlap — nudge the lower one further down (or upper one up) by
          // the vertical overlap amount + 2px padding.
          const overlap = Math.min(a.y2, b.y2) - Math.max(a.y1, b.y1) + 3;
          const target = (a.y1 > b.y1) ? a : b;
          const el = d3.select(target.el);
          const ly0 = +el.attr('data-ly') || 0;
          // target.el's anchor scales by 1/k, so to move `overlap` screen-px
          // in map coords we add overlap*k... but data-ly is in screen-px
          // (labelR). Actually updateZoomLayers applies lx/k so data-ly is
          // in a weird hybrid unit. Test: data-ly = labelR*sin, in update
          // we translate(ly/k). Translate is in PARENT coords (mapRoot) where
          // 1 unit = k on-screen px. So final on-screen offset = ly/k * k = ly px.
          // Therefore data-ly IS in on-screen px — add overlap directly.
          el.attr('data-ly', ly0 + overlap);
          el.attr('transform', `translate(${(+el.attr('data-lx'))/k} ${(ly0+overlap)/k}) scale(${1/k})`);
          // Update the cached rect for next pass.
          target.y1 += overlap;
          target.y2 += overlap;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
  // Redraw leader lines to follow any nudged labels.
  svg.selectAll('.base-label-anchor').each(function() {
    const el = d3.select(this);
    const leader = el.select('line[data-leader]');
    if (!leader.size()) return;
    const markerR = +leader.attr('data-marker-r');
    const labelR  = +leader.attr('data-label-r');
    const ang     = +leader.attr('data-angle');
    const lx = +el.attr('data-lx');
    const ly = +el.attr('data-ly');
    if (isFinite(markerR) && isFinite(labelR) && isFinite(ang)) {
      // Leader endpoint = marker position relative to label anchor origin.
      // Marker is at (markerR*cos, markerR*sin) in screen-px from centroid;
      // label is at (lx, ly) in screen-px from centroid. So endpoint in
      // anchor-local coords = (markerR*cos - lx, markerR*sin - ly), then
      // pulled in 5px along that vector.
      let ex = markerR * Math.cos(ang) - lx;
      let ey = markerR * Math.sin(ang) - ly;
      const d = Math.hypot(ex, ey) || 1;
      ex -= (ex / d) * 5;
      ey -= (ey / d) * 5;
      leader.attr('x2', ex).attr('y2', ey);
    } else {
      leader.attr('x2', -lx).attr('y2', -ly);
    }
  });
}

// Reset zoom to fit.
function resetZoom() {
  if (svg && state.zoom) {
    svg.transition().duration(400).call(state.zoom.transform, d3.zoomIdentity);
  }
}

function renderLand() {
  const countries = topojson.feature(state.world, state.world.objects.countries).features;
  const landLayer = svg.select('#landLayer');
  const borderLayer = svg.select('#borderLayer');

  landLayer.selectAll('path')
    .data(countries).enter()
    .append('path')
    .attr('d', pathGen)
    .attr('class', d => {
      const code = NAME_TO_OUR[d.properties.name];
      return FOCUS_COUNTRIES.has(code) ? 'land' : 'context-land';
    })
    .style('cursor', d => {
      const code = NAME_TO_OUR[d.properties.name];
      return SELECTABLE_COUNTRIES.has(code) ? 'pointer' : null;
    })
    .on('click', (event, d) => {
      const code = NAME_TO_OUR[d.properties.name];
      if (SELECTABLE_COUNTRIES.has(code)) selectCountry(code);
    });

  // Country borders (mesh)
  const borders = topojson.mesh(state.world, state.world.objects.countries, (a,b) => a !== b);
  borderLayer.append('path').datum(borders).attr('class', 'border').attr('d', pathGen);
}

function renderRivers() {
  // Hand-coded simplified Nile + tributaries (lon/lat waypoints)
  const nile = [
    [31.23, 30.05], [32.00, 29.0], [32.55, 25.7], [32.90, 24.0],
    [32.10, 22.0], [31.20, 20.5], [32.55, 15.5], // Khartoum confluence
  ];
  const whiteNile = [
    [32.55, 15.5], [32.10, 13.5], [31.60, 10.5], [31.55, 7.5], [31.57, 4.86]
  ];
  const blueNile = [
    [32.55, 15.5], [34.0, 13.5], [35.5, 12.2], [37.3, 12.0] // Lake Tana
  ];
  // Additional rivers — revealed at zoom ≥ 2.0 via opacity toggle on the group
  const atbara = [[32.55, 15.5], [33.8, 16.8], [35.5, 18.5], [37.2, 20.0]];
  const sobat  = [[31.55, 9.4], [32.3, 9.15], [33.8, 8.8], [35.4, 8.5]];
  const omo    = [[36.1, 4.5], [36.3, 5.5], [36.4, 7.0], [36.8, 8.2], [37.2, 9.0]];
  const shabelle = [[45.0, 2.1], [44.5, 3.2], [44.0, 4.8], [43.2, 6.0], [41.5, 7.5], [39.5, 8.5], [38.7, 9.0]];
  const juba   = [[42.5, -0.25], [42.5, 1.5], [42.7, 3.0], [42.3, 4.5], [41.5, 6.0], [40.0, 7.5], [39.3, 8.2]];

  const riverLayer = svg.select('#riverLayer');
  [nile, whiteNile, blueNile].forEach(r => {
    riverLayer.append('path')
      .datum({ type: 'LineString', coordinates: r })

  [atbara, sobat, omo, shabelle, juba].forEach(r => {
    secRivers.append('path')
      .datum({ type: 'LineString', coordinates: r })
      .attr('d', pathGen)
      .attr('class', 'river river-sm');
  });
}

function renderGeoLabels() {
  const layer = svg.select('#geoLayer');
  // Separate sub-groups so we can toggle by zoom threshold.
  const groups = {
    base: layer.append('g').attr('class', 'geo-group geo-base'),
    z2:   layer.append('g').attr('class', 'geo-group geo-z2').style('display', 'none'),
  };
  GEO_LABELS.forEach(g => {
    const [x, y] = projection([g.lon, g.lat]);
    if (!isFinite(x) || !isFinite(y)) return;
    const target = g.minZoom && g.minZoom >= 2 ? groups.z2 : groups.base;

    if (g.type === 'feature') {
      target.append('circle').attr('cx', x).attr('cy', y).attr('r', 2.5).attr('class', 'feature-dot');
      target.append('text').attr('x', x + 6).attr('y', y + 3).attr('class', 'feature-label').text(g.text);
    } else if (g.type === 'terrain' || g.type === 'terrain-large') {
      const t = target.append('text')
        .attr('x', x).attr('y', y)
        .attr('class', 'terrain-label' + (g.type === 'terrain-large' ? ' large' : ''))
        .attr('text-anchor', 'middle')
        .text(g.text);
      if (g.rotate) t.attr('transform', `rotate(${g.rotate} ${x} ${y})`);
    } else if (g.type === 'river-sm') {
      const t = target.append('text')
        .attr('x', x).attr('y', y)
        .attr('class', 'river-label sm')
        .attr('text-anchor', 'middle')
        .text(g.text);
      if (g.rotate) t.attr('transform', `rotate(${g.rotate} ${x} ${y})`);
    } else {
      const t = target.append('text')
        .attr('x', x).attr('y', y)
        .attr('class', 'geo-label' + (g.type === 'sea-large' ? ' large' : '') + (g.type === 'river' ? ' river-label' : ''))
        .attr('text-anchor', 'middle')
        .text(g.text);
      if (g.rotate) t.attr('transform', `rotate(${g.rotate} ${x} ${y})`);
    }
  });
}

function renderCountryLabels() {
  const layer = svg.select('#countryLabelLayer');
  LABEL_COUNTRIES.forEach(code => {
    const feat = state.countriesByIso[code];
    if (!feat) return;
    const c = pathGen.centroid(feat);
    if (!isFinite(c[0])) return;
    if (c[0] < -20 || c[0] > width + 20 || c[1] < -20 || c[1] > height + 20) return;
    const dc = DATA.countries[code];
    const name = dc ? dc.name : feat.properties.name;
    layer.append('text')
      .attr('x', c[0]).attr('y', c[1])
      .attr('class', 'country-label')
      .text(name);
  });
}

function renderCities() {
  const layer = svg.select('#cityLayer');
  layer.selectAll('*').remove();

  // Bind a cursor+click handler on every city / port element so the user
  // can open the city detail panel. The click hit-area is the city circle
  // AND its label; both share the city's `name` so the rail can look up
  // population and country context from CITY_POP.
  const bindCityClick = (selection, name) => {
    selection
      .style('cursor', 'pointer')
      .on('click', (ev) => { ev.stopPropagation(); selectCity(name); });
  };

  // --- Unified cluster absorption -----------------------------------------
  // At max zoom the Djibouti corridor stacks eight items inside a couple of
  // kilometres: six foreign bases + Djibouti port + Doraleh + the Djibouti
  // city dot. To keep any of it readable we let ports and primary cities be
  // absorbed into a foreign-base cluster when they fall within its 0.3°
  // radius, then splay the whole constellation on concentric rings (markers
  // inner, labels outer) around the cluster centroid. Items that are NOT
  // near a base still render in-place with counter-scaled markers.
  const BASE_COLORS = {
    USA: '#1F3A5F', CHN: '#B5651D', RUS: '#7A5C3A',
    FRA: '#4A6FA5', JPN: '#8A5A7C', ITA: '#6B8E6F',
    UAE: '#7D8440', TUR: '#7A3030', EGY: '#8A6D3B',
  };

  // Geographic proximity test used to decide whether a port / city should be
  // absorbed into the base cluster pass. Uses the same 0.3° threshold the
  // bases themselves cluster on.
  const nearAnyBase = (pt, thresh = 0.3) =>
    FOREIGN_BASES.some(b => Math.hypot(b.lon - pt.lon, b.lat - pt.lat) <= thresh);

  const absorbedCityNames = new Set();
  const absorbedPortNames = new Set();
  CITIES.forEach(c => { if (nearAnyBase(c)) absorbedCityNames.add(c.name); });
  PORTS.forEach(p => { if (nearAnyBase(p)) absorbedPortNames.add(p.name); });

  // --- Primary cities ---
  // Absorbed cities (= inside a foreign-base cluster) are *still* rendered
  // here so they appear at low zoom, when the cluster layer is hidden. They
  // get an 'absorbed-primary' class so updateZoomLayers can hide them once
  // the cluster takes over (zoom ≥ 3).
  const primary = layer.append('g').attr('class', 'city-primary');
  CITIES.forEach(c => {
    const [x, y] = projection([c.lon, c.lat]);
    if (!isFinite(x)) return;
    const absorbed = absorbedCityNames.has(c.name);
    const cityGroup = primary.append('g')
      .attr('class', 'city-hit' + (absorbed ? ' absorbed-primary' : ''));
    if (c.capital) {
      cityGroup.append('circle').attr('cx', x).attr('cy', y).attr('r', 3.2).attr('class', 'city-ring');
      cityGroup.append('circle').attr('cx', x).attr('cy', y).attr('r', 1.4).attr('class', 'city-dot');
    } else {
      cityGroup.append('circle').attr('cx', x).attr('cy', y).attr('r', 2).attr('class', 'city-dot');
    }
    cityGroup.append('text')
      .attr('x', x + 6).attr('y', y + 3.5)
      .attr('class', 'city-label' + (c.capital ? ' capital' : ''))
      .text(c.name);
    bindCityClick(cityGroup, c.name);
  });

  // --- Secondary cities — shown at zoom ≥ 2.5 ---
  const secondary = layer.append('g').attr('class', 'city-secondary').style('display', 'none');
  SECONDARY_CITIES.forEach(c => {
    const [x, y] = projection([c.lon, c.lat]);
    if (!isFinite(x)) return;
    const g = secondary.append('g').attr('class', 'city-hit');
    g.append('circle').attr('cx', x).attr('cy', y).attr('r', 1.4).attr('class', 'city-dot secondary');
    g.append('text')
      .attr('x', x + 5).attr('y', y + 3)
      .attr('class', 'city-label secondary')
      .text(c.name);
    bindCityClick(g, c.name);
  });

  // --- Non-absorbed ports — counter-scaled marker so the square stays ~6 px
  // regardless of zoom. (Before this, port rects scaled 8× at max zoom and
  // any two ports under 10 km apart physically overlapped each other.) ---
  const ports = layer.append('g').attr('class', 'port-layer').style('display', 'none');
  PORTS.forEach(p => {
    if (absorbedPortNames.has(p.name)) return;
    const [x, y] = projection([p.lon, p.lat]);
    if (!isFinite(x)) return;
    const g = ports.append('g').attr('class', 'city-hit');
    // Marker inside a counter-scaled anchor → stays visually ~6 px. Reuses
    // the base-* anchor classes so the existing zoom handler counter-scales
    // this along with everything else.
    const mAnchorGroup = g.append('g').attr('transform', `translate(${x} ${y})`);
    const mAnchor = mAnchorGroup.append('g').attr('class', 'base-marker-anchor');
    mAnchor.append('rect')
      .attr('x', -3).attr('y', -3).attr('width', 6).attr('height', 6)
      .attr('class', 'port-marker');
    const lAnchorGroup = g.append('g').attr('transform', `translate(${x} ${y})`);
    const lAnchor = lAnchorGroup.append('g')
      .attr('class', 'base-label-anchor')
      .attr('data-lx', 9).attr('data-ly', 3);
    lAnchor.append('text')
      .attr('class', 'port-label')
      .attr('text-anchor', 'start')
      .attr('dx', 0).attr('dy', 0)
      .text(p.name);
    bindCityClick(g, p.name);
  });

  // --- Foreign bases + absorbed ports + absorbed cities -------------------
  // Shown at zoom ≥ 3.0 alongside the port layer. Items are tagged with a
  // ctype ("base" | "port" | "capital" | "city") which drives marker shape
  // and color per member; the ring-splay mechanics are shared.
  const bases = layer.append('g').attr('class', 'base-layer').style('display', 'none');

  const clusterItems = [
    ...FOREIGN_BASES.map(b => ({ name: b.name, lat: b.lat, lon: b.lon, ctype: 'base', flag: b.flag })),
    ...PORTS.filter(p => absorbedPortNames.has(p.name))
            .map(p => ({ name: p.name, lat: p.lat, lon: p.lon, ctype: 'port' })),
    ...CITIES.filter(c => absorbedCityNames.has(c.name))
            .map(c => ({ name: c.name, lat: c.lat, lon: c.lon, ctype: c.capital ? 'capital' : 'city' })),
  ];
  const clusters = clusterBases(clusterItems, 0.3);

  // Draws the marker for a single cluster member inside a counter-scaled
  // anchor group already translated to its final screen position.
  const drawMemberMarker = (mAnchor, item) => {
    if (item.ctype === 'base') {
      mAnchor.append('path')
        .attr('d', 'M 0 -4.2 L 3.6 3.2 L -3.6 3.2 Z')
        .attr('class', 'base-marker')
        .attr('fill', BASE_COLORS[item.flag] || '#555');
    } else if (item.ctype === 'port') {
      mAnchor.append('rect')
        .attr('x', -3).attr('y', -3).attr('width', 6).attr('height', 6)
        .attr('class', 'port-marker');
    } else if (item.ctype === 'capital') {
      mAnchor.append('circle').attr('cx', 0).attr('cy', 0).attr('r', 3.4).attr('class', 'city-ring');
      mAnchor.append('circle').attr('cx', 0).attr('cy', 0).attr('r', 1.4).attr('class', 'city-dot');
    } else {
      mAnchor.append('circle').attr('cx', 0).attr('cy', 0).attr('r', 2).attr('class', 'city-dot');
    }
  };

  clusters.forEach(cluster => {
    const cpts = cluster.map(b => projection([b.lon, b.lat])).filter(p => p && isFinite(p[0]));
    if (!cpts.length) return;
    const cx = cpts.reduce((s,p) => s + p[0], 0) / cpts.length;
    const cy = cpts.reduce((s,p) => s + p[1], 0) / cpts.length;

    if (cluster.length === 1) {
      const b = cluster[0];
      const [x, y] = projection([b.lon, b.lat]);
      const mGroup = bases.append('g').attr('transform', `translate(${x} ${y})`);
      const mAnchor = mGroup.append('g').attr('class', 'base-marker-anchor');
      drawMemberMarker(mAnchor, b);
      const labelGroup = bases.append('g').attr('transform', `translate(${x} ${y})`);
      const labelAnchor = labelGroup.append('g')
        .attr('class', 'base-label-anchor')
        .attr('data-lx', 10).attr('data-ly', 0);
      const clickable = (b.ctype !== 'base');
      const text = labelAnchor.append('text')
        .attr('class', 'base-label')
        .attr('text-anchor', 'start')
        .attr('dx', 0).attr('dy', 3)
        .text(b.name);
      if (clickable) {
        mGroup.style('cursor', 'pointer').on('click', ev => { ev.stopPropagation(); selectCity(b.name); });
        labelGroup.style('cursor', 'pointer').on('click', ev => { ev.stopPropagation(); selectCity(b.name); });
      }
      return;
    }

    // Multi-member cluster — inner marker ring + outer label ring.
    const n = cluster.length;
    const withAngle = cluster.map((b, i) => {
      const p = projection([b.lon, b.lat]);
      const dx = p[0] - cx, dy = p[1] - cy;
      const angle = (dx === 0 && dy === 0) ? (i * 2 * Math.PI / n) : Math.atan2(dy, dx);
      return { b, p, angle };
    }).sort((a, z) => a.angle - z.angle);

    // Ring radii grow with membership — Djibouti's 8-item cluster gets a
    // wider splay than a two-base cluster elsewhere.
    const markerR = Math.max(16, 8 + n * 2.4);
    const labelR  = markerR + 46;
    const startAngle = withAngle[0].angle;

    withAngle.forEach((item, i) => {
      const { b } = item;
      const ang = startAngle + (i * 2 * Math.PI / n);
      const cosA = Math.cos(ang), sinA = Math.sin(ang);
      const clickable = (b.ctype !== 'base');

      // --- Marker on inner ring ---
      const mGroup = bases.append('g').attr('transform', `translate(${cx} ${cy})`);
      const mAnchor = mGroup.append('g')
        .attr('class', 'base-marker-anchor')
        .attr('data-lx', markerR * cosA)
        .attr('data-ly', markerR * sinA);
      drawMemberMarker(mAnchor, b);

      // --- Label on outer ring with leader line back to marker ---
      const labelGroup = bases.append('g').attr('transform', `translate(${cx} ${cy})`);
      const labelAnchor = labelGroup.append('g')
        .attr('class', 'base-label-anchor')
        .attr('data-lx', labelR * cosA)
        .attr('data-ly', labelR * sinA);
      labelAnchor.append('line')
        .attr('class', 'base-leader')
        .attr('x1', 0).attr('y1', 0)
        .attr('data-leader', '1')
        .attr('data-marker-r', markerR)
        .attr('data-label-r', labelR)
        .attr('data-angle', ang);
      const rightSide = cosA >= -0.01;
      labelAnchor.append('text')
        .attr('class', 'base-label')
        .attr('text-anchor', rightSide ? 'start' : 'end')
        .attr('dx', rightSide ? 5 : -5).attr('dy', 3)
        .text(b.name);

      if (clickable) {
        mGroup.style('cursor', 'pointer').on('click', ev => { ev.stopPropagation(); selectCity(b.name); });
        labelGroup.style('cursor', 'pointer').on('click', ev => { ev.stopPropagation(); selectCity(b.name); });
      }
    });
  });
}

// Single-link clustering by geo distance (degrees). Lat/lon euclidean is fine
// here since all our base clusters are tight (a few km).
function clusterBases(items, thresholdDeg) {
  const remaining = items.slice();
  const clusters = [];
  while (remaining.length) {
    const seed = remaining.shift();
    const group = [seed];
    let grew = true;
    while (grew) {
      grew = false;
      for (let i = remaining.length - 1; i >= 0; i--) {
        const b = remaining[i];
        if (group.some(g => {
          const dx = g.lon - b.lon, dy = g.lat - b.lat;
          return Math.hypot(dx, dy) <= thresholdDeg;
        })) {
          group.push(b);
          remaining.splice(i, 1);
          grew = true;
        }
      }
    }
    clusters.push(group);
  }
  return clusters;
}

// Sides rendered with a hatch pattern rather than solid fill: these signal
// contested territory, non-state influence, or reported-but-not-controlled
// presence — not clean control by one faction.
const HATCHED_SIDES = new Set(['contested', 'unrest', 'eritrean', 'shabaab', 'ash']);

function tintFillForSide(side) {
  if (side === 'contested') return 'url(#contested-hatch)';
  if (side === 'neutral') {
    return getComputedStyle(document.documentElement).getPropertyValue('--neutral').trim();
  }
  if (HATCHED_SIDES.has(side)) return `url(#hatch-${side})`;
  return `url(#solid-${side})`;
}

function renderTints() {
  const layer = svg.select('#tintLayer');
  layer.selectAll('*').remove();
  const mode = DATA.modes[state.mode];
  const control = (DATA.control && DATA.control[state.mode]) || {};

  // 1) Country-level alignments: tint the whole country, but skip any country
  //    that has admin-1 CONTROL entries in this mode (those get rendered below,
  //    and a blanket country tint underneath would muddy the palette).
  Object.entries(mode.alignments).forEach(([iso, side]) => {
    if (control[iso]) return;
    const feat = state.countriesByIso[iso];
    if (!feat) return;
    const pathD = pathGen(feat);
    if (!pathD) return;
    layer.append('path')
      .attr('d', pathD)
      .attr('class', 'tint')
      .attr('fill', tintFillForSide(side))
      .attr('opacity', side === 'neutral' ? 0.35 : 1)
      .style('cursor', 'pointer')
      .on('click', () => selectCountry(iso));
  });

  // 2) Admin-1 tints. For Sudan-mode Libya we may only tag a subset of shabiyat;
  //    untagged admin-1 features stay uncolored (falling through to the base
  //    land layer), so we never accidentally paint the whole country.
  Object.entries(control).forEach(([iso, regionMap]) => {
    const bank = state.admin1ByCountry[iso === 'SOL' ? 'SOL' : iso] || {};
    Object.entries(regionMap).forEach(([regionName, side]) => {
      const feat = bank[regionName];
      if (!feat) {
        console.warn(`admin-1 feature not found: ${iso} / "${regionName}"`);
        return;
      }
      const pathD = pathGen(feat);
      if (!pathD) return;
      // SOL (Somaliland) is its own country profile now, so clicks route
      // to SOL directly. Primary cities that fall inside a Somaliland region
      // are still labeled under SOM in DATA.cities — no change there.
      const clickIso = iso;
      layer.append('path')
        .attr('d', pathD)
        .attr('class', 'tint')
        .attr('fill', tintFillForSide(side))
        .attr('opacity', side === 'neutral' ? 0.35 : 1)
        .style('cursor', 'pointer')
        .on('click', () => selectCountry(clickIso));
    });
  });
}

// Curve between two projected points
function curvePath(x1, y1, x2, y2, curvature = 0.25) {
  const dx = x2 - x1, dy = y2 - y1;
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const ox = -dy * curvature, oy = dx * curvature;
  return `M ${x1} ${y1} Q ${mx + ox} ${my + oy} ${x2} ${y2}`;
}
function wavyPath(x1, y1, x2, y2, amp = 5) {
  const dx = x2 - x1, dy = y2 - y1, dist = Math.hypot(dx, dy);
  if (dist < 1) return `M ${x1} ${y1} L ${x2} ${y2}`;
  const ux = dx/dist, uy = dy/dist, nx = -uy, ny = ux;
  const waves = Math.max(3, Math.floor(dist / 40));
  let d = `M ${x1} ${y1}`;
  for (let i = 1; i <= waves; i++) {
    const t = i / waves;
    const px = x1 + dx * t, py = y1 + dy * t;
    const sign = (i % 2 === 0) ? 1 : -1;
    const cpx = px - dx/waves/2 + nx * amp * sign;
    const cpy = py - dy/waves/2 + ny * amp * sign;
    d += ` Q ${cpx} ${cpy} ${px} ${py}`;
  }
  return d;
}

function anchorProjected(id) {
  const a = ANCHORS[id];
  if (!a) return null;
  const p = projection(a);
  return p;
}

function renderArrows() {
  const layer = svg.select('#arrowLayer');
  layer.selectAll('*').remove();
  // Filter by the user's per-mode aid-type toggles. An arrow with no type
  // (shouldn't happen but guard anyway) is shown when any type is enabled.
  const typeOn = state.aidTypes[state.mode] || {};
  const arrows = (DATA.arrows[state.mode] || []).filter(a => !a.type || typeOn[a.type]);
  const mode = DATA.modes[state.mode];

  // Count arrows per from-to pair (for curvature splay between two nodes)
  // AND per target (for fanning the landing points so arrowheads don't stack).
  const pairCounts = {};
  const targetCounts = {};
  arrows.forEach(a => {
    const k = [a.from, a.to].sort().join('|');
    pairCounts[k] = (pairCounts[k]||0) + 1;
    targetCounts[a.to] = (targetCounts[a.to]||0) + 1;
  });
  const pairSeen = {};
  const targetSeen = {};

  arrows.forEach(a => {
    const fromP = anchorProjected(a.from);
    const toP = anchorProjected(a.to);
    if (!fromP || !toP) return;

    const sideObj = mode.sides.find(s => s.id === a.side);
    const color = sideObj ? sideObj.color : '#666';
    const style = arrowStyle(a.type);
    const w = tierWidth(a.tier);

    const key = [a.from, a.to].sort().join('|');
    pairSeen[key] = (pairSeen[key]||0) + 1;
    const n = pairSeen[key], total = pairCounts[key];
    const curv = total === 1 ? 0.25 : (n - (total+1)/2) * (0.38 / total) + 0.2;

    // Fan arrowheads around the target so multiple arrows don't stack into
    // one unreadable blob. Each incoming arrow lands on its own small arc
    // position around toP; the bearing from the origin controls WHICH side
    // of the target the arrow comes in from, then within that side we spread
    // evenly by arrival index.
    const tTotal = targetCounts[a.to];
    targetSeen[a.to] = (targetSeen[a.to]||0) + 1;
    const ti = targetSeen[a.to];
    let endX = toP[0], endY = toP[1];
    if (tTotal > 1) {
      const bearing = Math.atan2(fromP[1] - toP[1], fromP[0] - toP[0]);
      // ±28° fan, evenly distributed around the approach bearing
      const fan = 28 * Math.PI / 180;
      const offset = ((ti - (tTotal + 1) / 2) / Math.max(1, tTotal - 1)) * fan * 2;
      const theta = bearing + offset;
      // Landing-point radius scales with density but caps so far-apart arrows
      // still clearly point at the same country.
      const r = Math.min(18, 6 + tTotal * 2.2);
      endX = toP[0] + Math.cos(theta) * r;
      endY = toP[1] + Math.sin(theta) * r;
    }

    let d;
    if (style.wavy) d = wavyPath(fromP[0], fromP[1], endX, endY, 6);
    else d = curvePath(fromP[0], fromP[1], endX, endY, curv);

    const cid = color.replace('#','');

    // Shrink the arrowhead when many arrows converge so heads don't visually
    // swallow the destination. Size is applied per-path via marker-end href;
    // the base marker is 6×6, we scale down to 4×4 for dense targets.
    const headDense = tTotal >= 4;
    const headMarker = `url(#arrowhead-${cid}${headDense ? '-sm' : ''})`;

    // Halo for clicks
    layer.append('path')
      .attr('d', d)
      .attr('class', 'arrow-halo')
      .attr('stroke', 'transparent')
      .attr('stroke-width', Math.max(16, w + 14))
      .style('pointer-events', 'stroke')
      .style('cursor', 'pointer')
      .on('click', () => selectArrow(a.id));

    if (style.double) {
      // Double line effect: thick color + white inner
      layer.append('path').attr('d', d).attr('stroke', color).attr('stroke-width', w + 2.2).attr('data-base-w', w + 2.2).attr('fill','none').attr('opacity', 0.9).attr('class','arrow').style('pointer-events','stroke').style('cursor','pointer').on('click', () => selectArrow(a.id));
      layer.append('path').attr('d', d).attr('stroke', '#FAF8F3').attr('stroke-width', Math.max(0.8, w - 0.8)).attr('data-base-w', Math.max(0.8, w - 0.8)).attr('fill','none').attr('class','arrow').style('pointer-events','none');
      // head
      layer.append('path').attr('d', d).attr('stroke', color).attr('stroke-width', w).attr('data-base-w', w).attr('fill','none').attr('class','arrow').attr('marker-end', headMarker).attr('opacity', 0).style('pointer-events','none');
    } else {
      const p = layer.append('path')
        .attr('d', d)
        .attr('class', 'arrow')
        .attr('stroke', color).attr('stroke-width', w).attr('data-base-w', w)
        .attr('fill', 'none').attr('stroke-linecap', 'round')
        .attr('opacity', 0.88)
        .attr('marker-end', headMarker)
        .style('pointer-events','stroke').style('cursor','pointer')
        .on('click', () => selectArrow(a.id));
      if (style.dash) p.attr('stroke-dasharray', style.dash);
    }

    // Origination dot at the arrow's starting anchor — only for arrows that
    // start from a real on-map country, not the off-map gateways (whose
    // arrows should appear to enter from outside the frame, without a dot).
    if (!GATEWAYS[a.from]) {
      layer.append('circle')
        .attr('class', 'arrow-origin')
        .attr('cx', fromP[0]).attr('cy', fromP[1])
        .attr('r', Math.max(2.6, w * 0.9))
        .attr('data-base-r', Math.max(2.6, w * 0.9))
        .attr('fill', color)
        .attr('stroke', '#FAF8F3')
        .attr('stroke-width', 0.9)
        .attr('opacity', 0.95)
        .style('pointer-events', 'none');
    }
  });
}

// Draw labeled "gateway" chips at the edge of the map for off-map actors
// (USA, China, Russia). Only shows gateways that actually have arrows in the
// current mode, so unused powers don't crowd the frame.
function renderOffMapGateways() {
  const layer = svg.select('#gatewayLayer');
  layer.selectAll('*').remove();

  const arrows = DATA.arrows[state.mode] || [];
  // Which gateways have at least one arrow leaving them in this mode?
  const activeIds = new Set();
  arrows.forEach(a => {
    if (GATEWAYS[a.from]) activeIds.add(a.from);
    if (GATEWAYS[a.to])   activeIds.add(a.to);
  });

  activeIds.forEach(anchorId => {
    const cfg = GATEWAYS[anchorId];
    const anchor = ANCHORS[anchorId];
    if (!anchor || !cfg) return;
    const p = projection(anchor);
    if (!p) return;

    // Clamp to a short inset from the map edge so the chip always lands on-canvas.
    const inset = 14;
    let [x, y] = p;
    x = Math.max(inset, Math.min(width - inset, x));
    y = Math.max(inset, Math.min(height - inset, y));

    // Approx label size — JetBrains Mono at 10px bold caps.
    const label = cfg.label.toUpperCase();
    const padX = 9, padY = 5;
    const textW = label.length * 6.8;
    const boxW = textW + padX * 2;
    const boxH = 20;

    // Position the chip so its inner edge sits at (x,y) — anchor stays the
    // visual origin of any arrows terminating here.
    let bx, by;
    switch (cfg.side) {
      case 'left':  bx = x + 10;            by = y - boxH / 2; break;
      case 'right': bx = x - 10 - boxW;     by = y - boxH / 2; break;
      case 'top':   bx = x - boxW / 2;      by = y + 10;       break;
      case 'bottom':bx = x - boxW / 2;      by = y - 10 - boxH;break;
      default:      bx = x - boxW / 2;      by = y - boxH / 2;
    }

    const g = layer.append('g')
      .attr('class', 'gateway')
      .style('cursor', 'pointer')
      .on('click', () => selectCountry(cfg.code));

    // No anchor dot: off-map arrows arrive from off-screen, so the only
    // visual at the entry point should be the label chip itself. The arrow
    // line emerges from behind the chip.

    // Chip background + label.
    g.append('rect')
      .attr('class', 'gateway-bg')
      .attr('x', bx).attr('y', by)
      .attr('width', boxW).attr('height', boxH)
      .attr('rx', 2).attr('ry', 2);
    g.append('text')
      .attr('class', 'gateway-label')
      .attr('x', bx + boxW / 2)
      .attr('y', by + boxH / 2 + 3.5)
      .attr('text-anchor', 'middle')
      .text(label);
  });
}

// ---------- Rail ----------
function renderRail() {
  if (state.selected) {
    if (state.selected.type === 'arrow') return renderArrowDetail();
    if (state.selected.type === 'country') return renderCountryDetail();
    if (state.selected.type === 'city') return renderCityDetail();
