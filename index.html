  renderOffMap();
}

function typeIconSvg(type) {
  const common = `stroke="#555" fill="none" stroke-width="1.8"`;
  if (type === 'military') return `<svg viewBox="0 0 24 8"><line x1="1" y1="4" x2="22" y2="4" ${common}/></svg>`;
  if (type === 'diplomatic') return `<svg viewBox="0 0 24 8"><line x1="1" y1="4" x2="22" y2="4" ${common} stroke-dasharray="4 3"/></svg>`;
  if (type === 'financial') return `<svg viewBox="0 0 24 8"><line x1="1" y1="4" x2="22" y2="4" ${common} stroke-dasharray="1 3"/></svg>`;
  if (type === 'trade') return `<svg viewBox="0 0 24 8"><line x1="1" y1="3" x2="22" y2="3" ${common}/><line x1="1" y1="6" x2="22" y2="6" ${common}/></svg>`;
  if (type === 'illicit') return `<svg viewBox="0 0 24 8"><path d="M 1 4 Q 5 1 9 4 T 17 4 T 22 4" ${common}/></svg>`;
  return '';
}

function renderOffMap() {
  const mode = state.mode;
  const modeData = DATA.modes[mode];
  const offmap = DATA.offmap[mode];
  const rail = document.getElementById('rail');
  rail.innerHTML = `
    <div class="rail-inner">
      <div class="rail-section-title">Global / Off-Map Actors</div>
      <div class="rail-desc">Powers acting on this conflict from outside the region shown. Click arrows or countries on the map for detail.</div>
      ${offmap.map(a => {
        const sideObj = modeData.sides.find(s => s.id === a.lean);
        const dot = sideObj ? sideObj.color : '#999';
        return `
          <div class="actor-card">
            <div class="actor-head">
              <span class="actor-dot" style="background:${dot}"></span>
              <span class="actor-name">${a.name}</span>
            </div>
            <div class="actor-posture">${a.posture}</div>
            <div class="actor-types">${a.types.map(t => `<span class="type-chip">${typeIconSvg(t)}${t}</span>`).join('')}</div>
          </div>
        `;
      }).join('')}
      <div style="margin-top:22px; font-size:11px; color:var(--ink-3); line-height:1.55; font-family:'JetBrains Mono', monospace; letter-spacing:0.02em;">
        Click any arrow on the map for actor-pair details and sources. Click a shaded country for profile and role in this conflict.
      </div>
    </div>
  `;
}

function renderArrowDetail() {
  const a = (DATA.arrows[state.mode] || []).find(x => x.id === state.selected.id);
  if (!a) { state.selected = null; return renderRail(); }
  const mode = DATA.modes[state.mode];
  const sideObj = mode.sides.find(s => s.id === a.side);
  const color = sideObj ? sideObj.color : '#666';
  const rail = document.getElementById('rail');
  rail.innerHTML = `
    <div class="detail-panel">
      <button class="back-btn" onclick="clearSelection()">&larr; Back to actors</button>
      <div class="detail-kicker" style="color:${color}">Support flow · ${a.type}</div>
      <div class="detail-title">${a.title}</div>
      <div class="detail-meta">
        <div class="meta-item"><div class="k">Type</div><div class="v" style="text-transform:capitalize">${a.type}</div></div>
        <div class="meta-item"><div class="k">Intensity</div><div class="v">${['Minor','Significant','Major'][a.tier-1]}</div></div>
        <div class="meta-item"><div class="k">Period</div><div class="v">${a.dates}</div></div>
        <div class="meta-item"><div class="k">Backs</div><div class="v" style="color:${color}">${sideObj ? sideObj.label : ''}</div></div>
      </div>
      <div class="detail-summary">${a.summary}</div>
      <div class="sources-title">Sources</div>
      ${a.sources.map(s => `
        <div class="source-item">
          <span class="source-pub">${s.pub}</span>
          <a href="${s.url}" target="_blank" rel="noopener">${s.head}</a>
          <span class="source-date">${s.date}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// Per-mode alignment label for a given country iso and mode id. Used both
// by the main country detail block and by the cross-mode "other conflicts"
// card. Returns { label, color } — color comes from the mode's sides list.
function alignmentSummary(iso, modeId) {
  const modeData = DATA.modes[modeId];
  if (!modeData) return { label: '—', color: '#8A8A85' };
  let align = modeData.alignments[iso];
  if (!align) {
    // Admin-1 CONTROL entries: if the country has sub-regions tagged, say so.
    const c = DATA.control && DATA.control[modeId];
    if (c && c[iso]) align = 'multiple';
  }
  if (!align) return { label: 'No significant role', color: '#8A8A85' };
  if (align === 'contested') return { label: 'Contested / ambiguous', color: '#8A857A' };
  if (align === 'multiple') return { label: 'Internal factions (see map)', color: '#555' };
  const s = modeData.sides.find(x => x.id === align);
  return s ? { label: s.label, color: s.color } : { label: align, color: '#555' };
}

function renderCountryDetail() {
  const id = state.selected.id;
  const c = DATA.countries[id];
  if (!c) { state.selected = null; return renderRail(); }

  const here = alignmentSummary(id, state.mode);
  const role = c.roles ? c.roles[state.mode] : '';

  // Cross-mode card: every mode other than the currently selected one.
  const otherModes = Object.keys(DATA.modes).filter(m => m !== state.mode);
  const otherCardsHtml = otherModes.map(m => {
    const modeTitle = DATA.modes[m].title;
    const s = alignmentSummary(id, m);
    const otherRole = c.roles && c.roles[m] ? c.roles[m] : '';
    return `
      <div class="cross-row">
        <div class="cross-label">
          <span class="cross-dot" style="background:${s.color}"></span>
          <span class="cross-mode">${modeTitle}</span>
        </div>
        <div class="cross-side" style="color:${s.color}">${s.label}</div>
        ${otherRole ? `<div class="cross-role">${otherRole}</div>` : ''}
      </div>`;
  }).join('');

  // Sources for this country in the active mode.
  const modeSrcDict = (DATA.countrySources && DATA.countrySources[state.mode]) || {};
  const srcs = modeSrcDict[id] || [];
  const sourcesHtml = srcs.length ? `
    <div class="sources-block">
      <div class="sources-title">Sources</div>
      ${srcs.map(s => `
        <div class="source-item">
          <a href="${s.url}" target="_blank" rel="noopener">${s.pub}</a>
          <span class="src-date">${s.date}</span>
          <div class="src-head">${s.head}</div>
        </div>`).join('')}
    </div>` : '';

  const statusHtml = c.status
    ? `<div class="status-chip">${c.status}</div>` : '';

  const rail = document.getElementById('rail');
  rail.innerHTML = `
    <div class="detail-panel">
      <button class="back-btn" onclick="clearSelection()">&larr; Back to actors</button>
      <div class="detail-kicker">Country profile</div>
      <div class="detail-title">${c.name}</div>
      ${statusHtml}
      <div class="detail-meta">
        <div class="meta-item"><div class="k">Capital</div><div class="v">${c.capital}</div></div>
        <div class="meta-item"><div class="k">Population</div><div class="v">${c.pop}</div></div>
        <div class="meta-item"><div class="k">GDP (nominal)</div><div class="v">${c.gdp}</div></div>
        <div class="meta-item"><div class="k">GDP / capita</div><div class="v">${c.gdpPc}</div></div>
        <div class="meta-item" style="grid-column:1/-1"><div class="k">Military spend</div><div class="v">${c.mil}</div></div>
      </div>
      <div class="detail-kicker" style="color:${here.color}; margin-top:-6px;">${here.label}</div>
      <div class="detail-summary">${role}</div>
      ${sourcesHtml}
      <div class="cross-modes">
        <div class="cross-title">Role in other conflicts</div>
        ${otherCardsHtml}
      </div>
    </div>
  `;
}

function renderCityDetail() {
  const name = state.selected.id;
  const entry = CITIES.find(c => c.name === name) ||
                SECONDARY_CITIES.find(c => c.name === name) ||
                PORTS.find(p => p.name === name);
  if (!entry) { state.selected = null; return renderRail(); }
  const pop = CITY_POP[name] || 'Population not recorded';
  const countryIso = entry.country && entry.country.split('_')[0];
  const country = countryIso && DATA.countries[countryIso];
  const countryLine = country ? country.name : (entry.country || '');
  const isCapital = !!entry.capital;
  const rail = document.getElementById('rail');
  rail.innerHTML = `
    <div class="detail-panel">
      <button class="back-btn" onclick="clearSelection()">&larr; Back to actors</button>
      <div class="detail-kicker">${isCapital ? 'Capital city' : 'City'}</div>
      <div class="detail-title">${name}</div>
      <div class="detail-meta">
        <div class="meta-item"><div class="k">Country</div><div class="v">${countryLine}</div></div>
        <div class="meta-item"><div class="k">Population</div><div class="v">${pop}</div></div>
      </div>
      ${countryIso ? `<button class="back-btn" style="margin-top:4px" onclick="selectCountry('${countryIso}')">See ${country ? country.name : countryIso} country profile &rarr;</button>` : ''}
    </div>
  `;
}

function selectArrow(id) { state.selected = { type:'arrow', id }; renderRail(); }
function selectCountry(id) { state.selected = { type:'country', id }; renderRail(); }
function selectCity(name) { state.selected = { type:'city', id: name }; renderRail(); }
function clearSelection() { state.selected = null; renderRail(); }
window.clearSelection = clearSelection;
window.selectCountry = selectCountry;
window.selectCity = selectCity;

// ---------- Legend ----------
function renderLegend() {
  const legend = document.getElementById('legend');
  const mode = DATA.modes[state.mode];
  const hatchedLegendIds = new Set(['ash', 'shabaab', 'unrest', 'eritrean', 'contested']);
  const sidesHtml = mode.sides.map(s => {
    let sw;
    if (hatchedLegendIds.has(s.id)) sw = `background: repeating-linear-gradient(45deg, ${s.color} 0 3px, transparent 3px 6px); background-color: #FAF8F3;`;
    else if (s.id === 'neutral') sw = `background: ${s.color}; opacity: 0.5;`;
    else sw = `background: ${s.color}; opacity: 0.55;`;
    return `<span class="legend-swatch"><span class="sw" style="${sw}"></span>${s.label}</span>`;
  }).join('');
  // Each aid-type chip is a click-to-toggle filter for the active mode.
  // Turning one off hides arrows of that type; the rest of the map layout
  // (country tints, bases, cities) stays put. State is per-mode and
  // persists to localStorage via saveAidTypes().
  const typeSvgs = {
    military:   '<svg viewBox="0 0 34 10"><line x1="1" y1="5" x2="32" y2="5" stroke="currentColor" stroke-width="2.2" fill="none"/></svg>',
    diplomatic: '<svg viewBox="0 0 34 10"><line x1="1" y1="5" x2="32" y2="5" stroke="currentColor" stroke-width="2.2" stroke-dasharray="4 3" fill="none"/></svg>',
    financial:  '<svg viewBox="0 0 34 10"><line x1="1" y1="5" x2="32" y2="5" stroke="currentColor" stroke-width="2.2" stroke-dasharray="1 3" fill="none"/></svg>',
    trade:      '<svg viewBox="0 0 34 10"><line x1="1" y1="3.5" x2="32" y2="3.5" stroke="currentColor" stroke-width="1.3" fill="none"/><line x1="1" y1="6.5" x2="32" y2="6.5" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>',
    illicit:    '<svg viewBox="0 0 34 10"><path d="M 1 5 Q 5 1 9 5 T 17 5 T 25 5 T 32 5" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>',
  };
  const modeTypes = state.aidTypes[state.mode];
  const arrowLegend = AID_TYPES.map(t => {
    const on = !!modeTypes[t];
    return `<button class="legend-toggle ${on ? '' : 'off'}" data-aid-type="${t}" title="Click to ${on ? 'hide' : 'show'} ${t} flows in this view">${typeSvgs[t]}<span>${t}</span></button>`;
  }).join('');
  const tiersHtml = `
    <svg viewBox="0 0 70 10" width="70" height="10">
      <line x1="2" y1="5" x2="20" y2="5" stroke="#444" stroke-width="1.6"/>
      <line x1="26" y1="5" x2="44" y2="5" stroke="#444" stroke-width="2.8"/>
      <line x1="50" y1="5" x2="68" y2="5" stroke="#444" stroke-width="4.2"/>
    </svg>
    <span>minor · significant · major</span>
  `;
  legend.innerHTML = `
    <div class="legend-group">${sidesHtml}</div>
    <div class="legend-arrows">${arrowLegend}<span class="legend-tiers">${tiersHtml}</span></div>
    <div class="footer-note">For analytical illustration · Click an aid-type chip to filter · Sources in detail panels</div>
  `;
  // Wire aid-type toggles after render.
  legend.querySelectorAll('[data-aid-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.aidType;
      state.aidTypes[state.mode][t] = !state.aidTypes[state.mode][t];
      saveAidTypes();
      renderArrows();
      renderLegend();
    });
  });
}

function saveAidTypes() {
  try { localStorage.setItem('aid_types', JSON.stringify(state.aidTypes)); }
  catch { /* quota exhausted or private-mode; drop silently */ }
}

// ---------- Init ----------
document.querySelectorAll('#modeToggle button').forEach(b => {
  b.addEventListener('click', () => {
    state.mode = b.dataset.mode;
    state.selected = null;
    if (state.world) render();
  });
});
window.addEventListener('resize', () => {
  if (!state.world) return;
  svg.selectAll('*').remove();
  initSvg();
  render();
});
loadMap();

</script>
</body>
</html>
